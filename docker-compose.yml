services:
  # === Application ===
  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      otel-collector:
        condition: service_started
    env_file: .env
    volumes: ["./backend/app:/app/app"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker -l info -c 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env

  celery-beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat -l info
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env

  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
    volumes: ["./frontend/src:/app/src"]

  # === Data Stores ===
  postgres:
    image: postgres:16
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: llmops
      POSTGRES_USER: llmops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmops_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: [qdrant_data:/qdrant/storage]

  # === Observability ===
  langfuse:
    image: langfuse/langfuse:2
    ports: ["3001:3000"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://llmops:${POSTGRES_PASSWORD:-llmops_dev}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-changeme}
      NEXTAUTH_URL: http://localhost:3001

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports: ["4317:4317", "4318:4318"]
    volumes: ["./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml"]

  prometheus:
    image: prom/prometheus:latest
    ports: ["9090:9090"]
    volumes: ["./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"]

  grafana:
    image: grafana/grafana:latest
    ports: ["3002:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer

  tempo:
    image: grafana/tempo:latest
    ports: ["3200:3200"]
    volumes: ["./tempo/tempo.yaml:/etc/tempo.yaml"]
    command: ["-config.file=/etc/tempo.yaml"]

volumes:
  pgdata:
  qdrant_data:
  grafana_data:
