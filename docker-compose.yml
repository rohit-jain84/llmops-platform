services:
  # === Application ===
  backend:
    build: ./backend
    ports: ["8200:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      otel-collector:
        condition: service_started
    env_file: .env
    mem_limit: 2g

  celery-worker:
    build: ./backend
    command: celery -A app.workers.celery_app worker -l info -c 4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    mem_limit: 2g

  celery-beat:
    build: ./backend
    command: celery -A app.workers.celery_app beat -l info
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    mem_limit: 512m

  frontend:
    build: ./frontend
    ports: ["3200:80"]
    depends_on: [backend]
    mem_limit: 256m

  # === Data Stores ===
  postgres:
    image: postgres:16-alpine
    ports: ["5436:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: llmops
      POSTGRES_USER: llmops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmops_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmops"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    ports: ["6386:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports: ["6336:6333"]
    volumes: [qdrant_data:/qdrant/storage]
    mem_limit: 1g

  # === Observability ===
  langfuse:
    image: langfuse/langfuse:2
    ports: ["3201:3000"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://llmops:${POSTGRES_PASSWORD:-llmops_dev}@postgres:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-changeme}
      NEXTAUTH_URL: http://localhost:3201
    mem_limit: 1g

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports: ["4317:4317", "4318:4318"]
    volumes: ["./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  prometheus:
    image: prom/prometheus:latest
    ports: ["9096:9090"]
    volumes: ["./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  grafana:
    image: grafana/grafana:latest
    ports: ["3202:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

  tempo:
    image: grafana/tempo:latest
    ports: ["3203:3200"]
    volumes: ["./tempo/tempo.yaml:/etc/tempo.yaml"]
    command: ["-config.file=/etc/tempo.yaml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m

volumes:
  pgdata:
  qdrant_data:
  grafana_data:
