# Lite configuration — 4 services only (Postgres, Redis, backend, frontend).
# Use this for quick demos and evaluation without the full observability stack.
#
# Usage:
#   docker compose -f docker-compose.lite.yml up -d
#   docker compose -f docker-compose.lite.yml exec backend alembic upgrade head
#   docker compose -f docker-compose.lite.yml exec backend python scripts/seed_data.py
#
# Requirements: ~2 GB RAM (vs ~8-16 GB for the full 12-service stack)

services:
  backend:
    build: ./backend
    ports: ["8200:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      LANGFUSE_SECRET_KEY: ""
      LANGFUSE_PUBLIC_KEY: ""
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      QDRANT_URL: ""
    mem_limit: 2g

  frontend:
    build: ./frontend
    ports: ["3200:80"]
    depends_on: [backend]
    mem_limit: 256m

  postgres:
    image: postgres:16-alpine
    ports: ["5436:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    environment:
      POSTGRES_DB: llmops
      POSTGRES_USER: llmops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-llmops_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmops"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 1g

  redis:
    image: redis:7-alpine
    ports: ["6386:6379"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m

volumes:
  pgdata:
